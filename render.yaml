services:
  - type: web
    name: pension-saathi-api
    runtime: python
    rootDir: backend
    # Install tesseract (server-side OCR) + Hindi/Telugu/Tamil language packs
    # BEFORE pip install, so pytesseract can find the binary at boot.
    buildCommand: apt-get update && apt-get install -y --no-install-recommends tesseract-ocr tesseract-ocr-hin tesseract-ocr-tel tesseract-ocr-tam && pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: GOOGLE_API_KEY
        sync: false
      # Server-side voice (WhatsApp channel). Sarvam is default for STT + TTS.
      - key: SARVAM_API_KEY
        sync: false
      # Dedicated web search — Gemini grounding is NOT used for this.
      - key: TAVILY_API_KEY
        sync: false
      # AES-GCM key for encrypting OCR-extracted document text at rest.
      # Generate: python -c "import secrets,base64;print(base64.b64encode(secrets.token_bytes(32)).decode())"
      - key: OCR_ENCRYPTION_KEY
        sync: false
      # WhatsApp channel (leave blank if not using — falls back to web /chat).
      - key: WHATSAPP_TOKEN
        sync: false
      - key: WHATSAPP_PHONE_NUMBER_ID
        sync: false
      - key: WHATSAPP_VERIFY_TOKEN
        sync: false
      - key: PYTHON_VERSION
        value: 3.11.9
