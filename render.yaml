services:
  - type: web
    name: pension-saathi-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      # Gemini (primary AI reasoning)
      - key: GOOGLE_API_KEY
        sync: false
      # Groq fallback (when Gemini free tier rate limit hit)
      - key: GROQ_API_KEY
        sync: false
      # Allow mock fallback if both APIs unavailable
      - key: ALLOW_MOCK_FALLBACK
        value: "0"
      # Server-side voice (WhatsApp channel). Sarvam is default.
      - key: SARVAM_API_KEY
        sync: false
      - key: STT_PROVIDER
        value: sarvam
      - key: TTS_PROVIDER
        value: sarvam
      # Dedicated web search — NOT via Gemini grounding
      - key: TAVILY_API_KEY
        sync: false
      # AES-GCM encryption for OCR-extracted document text at rest
      - key: OCR_ENCRYPTION_KEY
        sync: false
      # Tesseract OCR (optional — installed via Docker)
      - key: TESSERACT_CMD
        value: /usr/bin/tesseract
      # WhatsApp Business API channel
      - key: WHATSAPP_TOKEN
        sync: false
      - key: WHATSAPP_PHONE_NUMBER_ID
        sync: false
      - key: WHATSAPP_VERIFY_TOKEN
        sync: false
